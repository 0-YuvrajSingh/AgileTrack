server:
  port: ${PORT:8080}

spring:
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]

  application:
    name: backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/agiletrack_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  jpa:
    database: postgresql
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:c2VjcmV0S2V5Rm9yQWdpbGVUcmFja0FwcGxpY2F0aW9uVGVzdGluZ1B1cnBvc2VzMzJCeXRlc01pbmltdW0=}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh:
    expiration: ${JWT_REFRESH_EXPIRATION:604800000}

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

spring.data.web.pageable:
  max-page-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false