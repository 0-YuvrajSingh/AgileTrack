version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agiletrack-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agiletrack_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agiletrack_password}
      POSTGRES_DB: ${POSTGRES_DB:-agiletrack}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agiletrack_user} -d ${POSTGRES_DB:-agiletrack}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: agiletrack-backend
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-agiletrack}
      - DATABASE_USERNAME=${POSTGRES_USER:-agiletrack_user}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-agiletrack_password}
      - JWT_SECRET=${JWT_SECRET:-VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySldUU2lnbmluZ1RoYXRNdXN0QmVBdExlYXN0MzJCeXRlc0xvbmc=}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: agiletrack-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
