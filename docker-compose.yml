version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agiletrack-db
    environment:
      POSTGRES_USER: agiletrack_user
      POSTGRES_PASSWORD: agiletrack_password
      POSTGRES_DB: agiletrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agiletrack_user -d agiletrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: agiletrack-backend
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/agiletrack
      - DATABASE_USERNAME=agiletrack_user
      - DATABASE_PASSWORD=agiletrack_password
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: agiletrack-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
